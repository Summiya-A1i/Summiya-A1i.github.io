<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summiya's Journey | {{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
        <style>
        :root {
            --pink: #ff69b4; 
            --black: #0d0d0d;
            --surface: #1a1a1a;
            --sidebar-width: 260px;
        }

        body {
            background-color: var(--black);
            color: #f0f0f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0;
            display: flex; /* Kept for laptop layout */
        }

        /* 🎀 SIDEBAR */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: #111;
            border-right: 2px solid var(--pink);
            position: fixed;
            display: flex;
            flex-direction: column;
            padding: 30px 20px;
            box-sizing: border-box;
            z-index: 1000;
            transition: 0.4s ease-in-out;
        }

        .sidebar .logo { 
            font-size: 1.5rem; font-weight: bold; color: var(--pink); 
            text-shadow: 0 0 10px var(--pink); margin-bottom: 40px; text-align: center;
        }

        /* 🌸 MAIN CONTENT - Laptop Centering Fix */
        .main-content {
            margin-left: var(--sidebar-width); 
             width: calc(100% - var(--sidebar-width)); /* This keeps laptop view perfect */
            min-height: 100vh;
        }

        /* 📱 MENU ICON - Pink Visibility Fix */
        .menu-icon {
            display: none; /* Hidden on laptop */
            background: rgba(13, 13, 13, 0.9) !important;
              border: 2px solid var(--pink) !important;
            color: var(--pink) !important; /* FORCES TEXT TO BE PINK */
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 105, 180, 0.5);
            position: fixed !important;
            top: 15px; left: 15px;
            z-index: 9999 !important;
            font-weight: bold;
        }

        /* 📲 MOBILE OVERRIDE */
        @media (max-width: 850px) {
            body { display: block !important; }
            .menu-icon { display: block !important; } 

            .sidebar { 
                left: -280px !important; 
                position: fixed !important;
            }

            .sidebar.active { left: 0 !important; }

            .main-content { 
                margin-left: 0 !important;
                width: 100% !important;
                padding-top: 0 !important;
            }

            .hero { margin-top: 0 !important; }
        }
    </style>
